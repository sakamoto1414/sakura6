<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Loading...</title>
    <style>
        :root { --line-green: #06C755; --bg-gray: #f8f9fa; }
        body, html { height: 100%; margin: 0; font-family: sans-serif; background: var(--bg-gray); color: #333; display: flex; align-items: center; justify-content: center; }
        .main-card { background: #fff; width: 90%; max-width: 380px; padding: 40px 20px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; }
        .loader-ring { display: inline-block; width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid var(--line-green); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-txt { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .sub-txt { font-size: 14px; color: #666; line-height: 1.6; }
        .manual-trigger { margin-top: 30px; display: block; background: var(--line-green); color: #fff; text-decoration: none; padding: 15px; border-radius: 12px; font-weight: bold; box-shadow: 0 4px 15px rgba(6,199,85,0.3); }
    </style>
    
    <script>
        !function(w,d,t){w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie","holdConsent","revokeConsent","grantConsent"],ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);ttq.instance=function(t){for(var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)ttq.setAndDefer(e,ttq.methods[n]);return e},ttq.load=function(e,n){var r="https://analytics.tiktok.com/i18n/pixel/events.js",o=n&&n.partner;ttq._i=ttq._i||{},ttq._i[e]=[],ttq._i[e]._u=r,ttq._t=ttq._t||{},ttq._t[e]=+new Date,ttq._o=ttq._o||{},ttq._o[e]=n||{};n=document.createElement("script");n.type="text/javascript",n.async=!0,n.src=r+"?sdkid="+e+"&lib="+t;e=document.getElementsByTagName("script")[0];e.parentNode.insertBefore(n,e)};
        
        // ここに新しいPixel IDを入力
        ttq.load('YOUR_NEW_PIXEL_ID');
        ttq.page();
    }(window, document, 'ttq');
</script>
</head>
<body>

<div class="main-card">
    <div class="loader-ring"></div>
    <div class="status-txt">認証を完了しています...</div>
    <p class="sub-txt">
        LINEアプリへ安全に接続します。<br>
        このまま数秒お待ちください。
    </p>
    
    <a href="javascript:void(0);" id="jumpBtn" class="manual-trigger">
        LINEを開く
    </a>
</div>

<script>
(function() {
    // 1. URLの難読化 (lin.ee/R5HWtHm を分割)
    const protocol = "https://";
    const domain = "lin.ee/";
    const path = "R5HWtHm";
    const finalTarget = protocol + domain + path;

    // ボタンにURLをセット
    const btn = document.getElementById('jumpBtn');
    btn.href = finalTarget;

    // 2. 遷移実行関数
    const performJump = () => {
        // 二重発火防止
        if(window.isRedirected) return;
        window.isRedirected = true;

        // TikTok内ブラウザ等、一部の環境でlocation.hrefが効かない場合の対策
        setTimeout(() => {
            window.location.replace(finalTarget);
        }, 50);
        
        // 予備：強制リンククリック
        const a = document.createElement('a');
        a.href = finalTarget;
        a.rel = 'noopener noreferrer';
        a.click();
    };

    // 3. 発火条件の多様化
    // A: ページ読み込み完了時 (タイミングをランダムに少しずらす)
    window.addEventListener('load', () => {
        const delay = Math.floor(Math.random() * (1200 - 800 + 1)) + 800; // 800ms〜1200ms
        setTimeout(performJump, delay);
    });

    // B: ユーザーのわずかな操作を検知（クローラー回避に有効）
    ['touchstart', 'scroll', 'click'].forEach(event => {
        window.addEventListener(event, () => {
            // ページロードから500ms以上経過してれば即実行
            setTimeout(performJump, 100);
        }, {once: true});
    });

    // C: TikTokアプリ内ブラウザ特有の挙動対策
    // アプリがバックグラウンドに回った時（遷移成功時）の処理
    document.addEventListener("visibilitychange", function() {
        if (document.visibilityState === 'hidden') {
            console.log("Jump success");
        }
    });

})();
</script>

</body>
</html>
