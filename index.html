<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>LINE公式アカウント｜お得な情報をお届け</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap');

        :root {
            --line-green: #06C755;
            --line-green-dark: #05b34c;
            --text-main: #1a1a1a;
            --text-sub: #5f6368;
            --bg: #f0f2f5;
            --card: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-text-size-adjust: 100%;
        }

        .card {
            background: var(--card);
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            padding: 36px 24px 28px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            text-align: center;
            animation: fadeUp 0.5s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .line-icon {
            width: 64px; height: 64px;
            background: var(--line-green);
            border-radius: 18px;
            margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 14px rgba(6,199,85,0.25);
        }
        .line-icon svg { width: 38px; height: 38px; fill: #fff; }

        .heading {
            font-size: 20px;
            font-weight: 900;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        .heading em { font-style: normal; color: var(--line-green); }

        .desc {
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.75;
            margin-bottom: 24px;
        }

        .benefits {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 28px;
            text-align: left;
        }
        .benefit-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f7faf8;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 13.5px;
            font-weight: 600;
        }
        .benefit-row .icon {
            flex-shrink: 0;
            width: 32px; height: 32px;
            background: var(--line-green);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
            color: #fff;
        }

        /* 全画面タップエリア */
        .tap-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .cta-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            background: var(--line-green);
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(6,199,85,0.3);
            transition: transform 0.15s, background 0.15s;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
            z-index: 60;
        }
        .cta-btn:active { transform: scale(0.97); background: var(--line-green-dark); }
        .cta-btn svg { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; }

        .cta-btn::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 18px;
            border: 2px solid var(--line-green);
            animation: pulse 2s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.03); }
        }

        .tap-hint {
            font-size: 13px;
            color: var(--line-green);
            margin-top: 14px;
            font-weight: 600;
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* フォールバック */
        .fallback {
            display: none;
            margin-top: 20px;
            padding: 20px 16px;
            background: #fefefe;
            border: 1.5px solid #e8e8e8;
            border-radius: 16px;
            animation: fadeUp 0.35s ease-out;
        }
        .fallback.show { display: block; }

        .fallback-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--text-main);
        }

        .fallback-methods {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .fallback-step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            text-align: left;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-sub);
        }
        .fallback-step .num {
            flex-shrink: 0;
            width: 24px; height: 24px;
            background: var(--line-green);
            color: #fff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }

        .copy-id-area {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
        }
        .line-id-box {
            flex: 1;
            padding: 12px 14px;
            background: #f5f5f5;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.3px;
            text-align: center;
            user-select: all;
            -webkit-user-select: all;
        }
        .copy-btn {
            flex-shrink: 0;
            padding: 12px 16px;
            background: var(--line-green);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            z-index: 60;
            position: relative;
        }
        .copy-btn.copied { background: #333; }

        .open-browser-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            margin-top: 14px;
            padding: 13px;
            background: #fff;
            color: var(--line-green);
            font-size: 14px;
            font-weight: 700;
            border: 2px solid var(--line-green);
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            z-index: 60;
            position: relative;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 100;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #aaa;
            line-height: 1.6;
        }
    </style>
